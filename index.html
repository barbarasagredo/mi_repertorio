<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi repertorio</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
      integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <h2 class="mt-5">mi repertorio &#119070;</h2>
    <div id="AgregarCancion">
      <div class="container py-4">
        <div>
          <div class="form-group row">
            <label for="cancion" class="col-sm-2 col-form-label"
              >Canción:</label
            >
            <div class="col-sm-10">
              <input
                type="text"
                class="form-control"
                id="cancion"
                value="Brujas"
              />
            </div>
          </div>
          <div class="form-group row">
            <label for="artista" class="col-sm-2 col-form-label"
              >Artista:
            </label>
            <div class="col-sm-10">
              <input
                type="text"
                class="form-control"
                id="artista"
                value="Princess Nokia"
              />
            </div>
          </div>
          <div class="form-group row">
            <label for="tono" class="col-sm-2 col-form-label">Tono:</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="tono" value="Em" />
            </div>
          </div>
          <button
            onclick="nuevaCancion()"
            id="agregar"
            class="m-auto btn btn-success"
          >
            Agregar
          </button>
          <button
            onclick="editarCancion()"
            id="editar"
            class="m-auto btn btn-info"
          >
            Editar
          </button>
        </div>
      </div>
    </div>
    <div id="ListaCanciones">
      <h4>tabla de canciones &#127908;</h4>
      <div class="container py-4">
        <table class="table">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Canción</th>
              <th scope="col">Artista</th>
              <th scope="col">Tono</th>
              <th scope="col">-</th>
            </tr>
          </thead>
          <tbody id="cuerpo"></tbody>
        </table>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>

<script>
  let url = "/canciones";
  let tbody = document.getElementById("cuerpo");
  let cancion = document.getElementById("cancion");
  let artista = document.getElementById("artista");
  let tono = document.getElementById("tono");

  let canciones = [];
  window.onload = getData();

  async function getData() {
    await axios.get(url).then((data) => {
      canciones = data.data;
      tbody.innerHTML = "";
      console.log(canciones);
      canciones.forEach((c, i) => {
        tbody.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${c.titulo}</td>
          <td>${c.artista}</td>
          <td>${c.tono}</td>
          <td class="text-center">
               <i class="fa-solid fa-pen-to-square text-warning fa-lg mx-2"
                 style="cursor:pointer"
                 onclick="prepararCancion(${i},'${c.id}')"></i>

              <i class="fa-solid fa-trash text-danger fa-lg mx-2"
                style="cursor:pointer"
                onclick="eliminarCancion(${i},'${c.id}')"></i>
          </td>
        </tr>
      `;
      });
    });
    cancion.value = "";
    artista.value = "";
    tono.value = "";
  }

  function nuevaCancion() {
    cancion;
    artista;
    tono;
    const id = Math.floor(Math.random() * 9999);
    let data = {
      id,
      titulo: cancion.value,
      artista: artista.value,
      tono: tono.value,
    };
    console.log(data);
    axios.post(url, data).then(() => getData());
  }

  function eliminarCancion(i, id) {
    axios.delete(url + "/" + id).then(() => {
      alert("Canción " + canciones[i].titulo + " eliminada");
      getData();
    });
  }

  function prepararCancion(i, id) {
    cancion.value = canciones[i].titulo;
    artista.value = canciones[i].artista;
    tono.value = canciones[i].tono;
    document
      .getElementById("editar")
      .setAttribute("onclick", `editarCancion('${id}')`);
    document.getElementById("agregar").style.display = "none";
    document.getElementById("editar").style.display = "block";
  }

  function editarCancion(id) {
    axios
      .put(url + "/" + id, {
        id,
        titulo: cancion.value,
        artista: artista.value,
        tono: tono.value,
      })
      .then(() => {
        getData();
        document.getElementById("agregar").style.display = "block";
        document.getElementById("editar").style.display = "none";
      });
  }
</script>
